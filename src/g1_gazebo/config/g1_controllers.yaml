controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz, matches gazebo's default max_step_size (0.001s)

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    body_controller:
      type: position_controllers/JointGroupPositionController

    left_hand_controller:
      type: position_controllers/JointGroupPositionController

    right_hand_controller:
      type: position_controllers/JointGroupPositionController

# Raw position forwarders (Float64MultiArray on <name>/commands): no PID, no
# trajectory interpolation, gazebo_ros2_control's GazeboSystem kinematically
# sets each joint straight to the commanded angle (Joint::SetPosition()) --
# see g1_tether.gazebo.xacro's header comment for why this replaced the
# earlier effort/PID approach. g1_gazebo's position_bridge.py node forwards
# /g1/position_command into the *_controller/commands topics below in the
# right per-group joint order; it does no gain computation of any kind.
body_controller:
  ros__parameters:
    joints:
        - left_hip_pitch_joint
        - left_hip_roll_joint
        - left_hip_yaw_joint
        - left_knee_joint
        - left_ankle_pitch_joint
        - left_ankle_roll_joint
        - right_hip_pitch_joint
        - right_hip_roll_joint
        - right_hip_yaw_joint
        - right_knee_joint
        - right_ankle_pitch_joint
        - right_ankle_roll_joint
        - waist_yaw_joint
        - waist_roll_joint
        - waist_pitch_joint
        - left_shoulder_pitch_joint
        - left_shoulder_roll_joint
        - left_shoulder_yaw_joint
        - left_elbow_joint
        - left_wrist_roll_joint
        - left_wrist_pitch_joint
        - left_wrist_yaw_joint
        - right_shoulder_pitch_joint
        - right_shoulder_roll_joint
        - right_shoulder_yaw_joint
        - right_elbow_joint
        - right_wrist_roll_joint
        - right_wrist_pitch_joint
        - right_wrist_yaw_joint
        - neck_yaw_joint
        - neck_pitch_joint
    interface_name: position

left_hand_controller:
  ros__parameters:
    joints:
        - left_index_mcp_flex
        - left_index_pip
        - left_index_dip
        - left_middle_mcp_flex
        - left_middle_pip
        - left_middle_dip
        - left_ring_mcp_flex
        - left_ring_pip
        - left_ring_dip
        - left_pinky_mcp_flex
        - left_pinky_pip
        - left_pinky_dip
        - left_thumb_cmc_abd
        - left_thumb_cmc_flex
        - left_thumb_mcp
        - left_thumb_ip
    interface_name: position

right_hand_controller:
  ros__parameters:
    joints:
        - right_index_mcp_flex
        - right_index_pip
        - right_index_dip
        - right_middle_mcp_flex
        - right_middle_pip
        - right_middle_dip
        - right_ring_mcp_flex
        - right_ring_pip
        - right_ring_dip
        - right_pinky_mcp_flex
        - right_pinky_pip
        - right_pinky_dip
        - right_thumb_cmc_abd
        - right_thumb_cmc_flex
        - right_thumb_mcp
        - right_thumb_ip
    interface_name: position
